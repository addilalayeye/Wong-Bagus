<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reward Timer</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      background: rgba(255,255,255,0.1);
      padding: 40px 20px;
      border-radius: 20px;
      width: 90%;
      max-width: 420px;
    }
    h1 { font-size: 28px; margin-bottom: 20px; }
    #timer { font-size: 72px; font-weight: bold; margin: 20px 0; letter-spacing: 4px; }
    #points { font-size: 26px; margin: 15px 0; }
    button {
      padding: 15px 30px;
      font-size: 18px;
      margin: 8px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      width: 80%;
      max-width: 300px;
    }
    #startBtn { background: #4CAF50; color: white; }
    #watchAdBtn { background: #FF9800; color: white; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎁 Reward Timer</h1>
    <div id="timer">25:00</div>
    <div id="points">Points: 0</div>
    
    <button id="startBtn">START / PAUSE</button><br>
    <button id="watchAdBtn">🎥 TONTON IKLAN (+20 Points)</button>
  </div>

  <script>
    let timeLeft = 25 * 60;
    let isRunning = false;
    let timerInterval;
    let points = 0;

    const timerEl = document.getElementById('timer');
    const pointsEl = document.getElementById('points');
    const startBtn = document.getElementById('startBtn');
    const watchAdBtn = document.getElementById('watchAdBtn');

    function showRewardedAd() {
      if (typeof adBreak !== 'undefined') {
        adBreak({
          type: 'reward',
          name: 'reward_timer_points',
          beforeReward: (showAdFn) => { showAdFn(); },
          adViewed: () => {
            points += 20;
            pointsEl.textContent = `Points: ${points}`;
            alert("✅ Iklan selesai! +20 Points");
          },
          adDismissed: () => {
            alert("Iklan ditutup.");
          }
        });
      } else {
        alert("Iklan belum muncul. Coba refresh halaman atau tunggu beberapa menit.");
      }
    }

    function updateDisplay() {
      let min = Math.floor(timeLeft / 60);
      let sec = timeLeft % 60;
      timerEl.textContent = `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }

    function startTimer() {
      if (isRunning) {
        clearInterval(timerInterval);
        startBtn.textContent = "START";
        isRunning = false;
      } else {
        isRunning = true;
        startBtn.textContent = "PAUSE";
        timerInterval = setInterval(() => {
          timeLeft--;
          updateDisplay();

          if (timeLeft % 240 === 0 && timeLeft > 0) {
            watchAdBtn.style.display = 'block';
          }

          if (timeLeft <= 0) {
            completeSession();
          }
        }, 1000);
      }
    }

    function completeSession() {
      clearInterval(timerInterval);
      isRunning = false;
      points += 10;
      pointsEl.textContent = `Points: ${points}`;
      startBtn.textContent = "START";
      timeLeft = 25 * 60;
      updateDisplay();
      watchAdBtn.style.display = 'none';
    }

    startBtn.addEventListener('click', startTimer);
    watchAdBtn.addEventListener('click', () => {
      showRewardedAd();
      watchAdBtn.style.display = 'none';
    });

    updateDisplay();
  </script>

  <!-- AdSense Script dengan ID kamu -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5963666797707136" crossorigin="anonymous"></script>
</body>
</html>
